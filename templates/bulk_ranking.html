<!DOCTYPE html>
<html>
<head>
    <title>Bulk Resume Ranking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>

<div class="container">

    <h1>Bulk Resume Ranking</h1>
    <p>Upload one job description and multiple resumes to rank candidates</p>

    <form action="/rank_resumes" method="POST" enctype="multipart/form-data">

        <label>Job Description (PDF)</label>
        <input type="file" name="job_description" accept=".pdf" required>

        <label>Multiple Resumes (PDF)</label>
        <input type="file" name="resumes" accept=".pdf" multiple required>

        <input type="submit" value="Rank Resumes">

    </form>

    {% if error %}
        <div class="recommendation" style="border-left:6px solid #dc2626;">
            {{ error }}
        </div>
    {% endif %}

    <a href="/" class="bulk-btn">← Back to ATS Checker</a>

</div>

</body>
</html>
